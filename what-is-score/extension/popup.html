<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마스터홍 판매신호</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header>
        <p class="eyebrow">Master Hong</p>
        <h1>판매신호 분석기</h1>
        <p>네이버 상품 페이지에서 공개 판매신호를 감지해 마스터홍에서 분석합니다.</p>
      </header>

      <section class="actions">
        <button id="analyzeProductButton" type="button">이 상품 분석하기</button>
        <button id="collectButton" type="button">현재 탭 분석</button>
        <button id="openWebAppButton" type="button" disabled>마스터홍에서 결과 보기</button>
      </section>

      <p id="statusText" class="status">대기중</p>

      <section id="summary" class="summary empty">
        <strong>아직 수집 전입니다.</strong>
        <span>네이버 상품 페이지에서 현재 탭 분석을 누르세요.</span>
      </section>

      <section>
        <h2>정규화 신호</h2>
        <div id="normalizedBoard" class="normalized-board"></div>
      </section>

      <details>
        <summary>개발자용 도구</summary>
        <div class="dev-actions">
          <button id="copyJsonButton" type="button" disabled>JSON 복사</button>
          <button id="copyPasteButton" type="button" disabled>붙여넣기용 복사</button>
        </div>
        <h2>전체 감지 후보</h2>
        <div id="signalList" class="signal-list"></div>
      </details>

      <section>
        <h2>미리보기</h2>
        <pre id="previewBox">{}</pre>
      </section>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
